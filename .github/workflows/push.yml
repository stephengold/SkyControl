---
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sky-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.name }}
    if: ${{ !contains(github.event.head_commit.message || '', '[ci skip]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Java 17
            os: ubuntu-24.04
            java: '17'
            command: ./gradlew --no-daemon clean build packageLocal --console=plain --stacktrace
            shell: bash
          - name: Windows Java 17
            os: windows-2025
            java: '17'
            command: gradlew.bat --no-daemon clean build packageLocal --console=plain --stacktrace
            shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test, checkstyle, and local package
        shell: ${{ matrix.shell }}
        run: ${{ matrix.command }}

      - name: Upload problem reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            build/reports/**
            **/build/reports/**
            **/build/test-results/**
