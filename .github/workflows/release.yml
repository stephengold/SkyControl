name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix, for example 1.0.0'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release version: ${VERSION}"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build and test
        shell: cmd
        run: gradlew.bat --no-daemon clean build packageLocal --console=plain --stacktrace -PskySimulationVersion=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradlew.bat --no-daemon publishGithubPackage --console=plain --stacktrace -PskySimulationVersion=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SkySimulation v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES_v${{ steps.version.outputs.version }}.md
          generate_release_notes: true
          files: |
            SkyLibrary/build/libs/sky-simulation-${{ steps.version.outputs.version }}.jar
            SkyLibrary/build/libs/sky-simulation-${{ steps.version.outputs.version }}-sources.jar
            SkyLibrary/build/libs/sky-simulation-${{ steps.version.outputs.version }}-javadoc.jar
            SkyLibrary/build/libs/sky-simulation-${{ steps.version.outputs.version }}.pom
            SkyLibrary/build/libs/sky-simulation-${{ steps.version.outputs.version }}.module
